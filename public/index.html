<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>中式餐具包调研</title>
  <style>
    :root {
      --bg: #f5f1e8;
      --card: #fffdf8;
      --ink: #1f2937;
      --muted: #6b7280;
      --line: #e8ddca;
      --accent: #8f5f27;
      --accent-soft: #f7ead3;
      --success: #1f7a4f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #f6efe1 0%, var(--bg) 100%);
      color: var(--ink);
    }
    .wrap {
      max-width: 1120px;
      margin: 0 auto;
      padding: 28px 18px 56px;
    }
    .hero, .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: 0 12px 28px rgba(95, 71, 35, 0.07);
    }
    .hero { padding: 28px; }
    .hero-layout {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      align-items: flex-start;
    }
    .hero-copy {
      flex: 1;
      min-width: 0;
    }
    .hero-note-inline {
      margin-top: 10px;
      color: #6b5a43;
      font-size: 14px;
      line-height: 1.6;
    }
    .hero-side {
      width: 200px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 12px;
    }
    .toolbar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    .button {
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    .button-primary {
      background: linear-gradient(90deg, #9f6d2f, #7c4c1a);
      color: white;
    }
    .button-secondary {
      background: var(--accent-soft);
      color: var(--accent);
    }
    .status {
      margin-top: 14px;
      min-height: 24px;
      color: var(--success);
      font-weight: 600;
    }
    .toast {
      position: fixed;
      left: 50%;
      bottom: 32px;
      transform: translateX(-50%) translateY(16px);
      background: rgba(31, 41, 55, 0.92);
      color: #fff;
      padding: 12px 18px;
      border-radius: 999px;
      font-size: 14px;
      box-shadow: 0 12px 24px rgba(31, 41, 55, 0.22);
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
      z-index: 1000;
    }
    .toast.is-visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .list {
      display: grid;
      gap: 16px;
      margin-top: 20px;
    }
    .footer-actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 24px;
    }
    .card {
      padding: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
    }
    th, td {
      padding: 10px 8px;
      border-bottom: 1px solid #efe5d5;
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }
    th {
      color: #6b5a43;
      background: #fcf7ed;
    }
    .options {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 16px;
    }
    .option {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #fffaf1;
      border: 1px solid #ecdcc1;
      border-radius: 14px;
      padding: 12px 14px;
      cursor: pointer;
    }
    .option input { transform: scale(1.15); }
    .option strong { display: block; }
    .muted { color: var(--muted); }
    @media (max-width: 720px) {
      .options { grid-template-columns: 1fr; }
      .hero-layout {
        flex-direction: column;
      }
      .hero-side {
        width: 100%;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="hero-layout">
        <div class="hero-copy">
          <h1>中式餐具包调研</h1>
          <div class="hero-note-inline">
            补充说明：中式餐具包包含一双筷子、一个勺子、一个牙签和一张纸巾。
          </div>
          <div id="status" class="status"></div>
        </div>
        <div class="hero-side">
          <div class="toolbar">
            <button id="refreshButton" class="button button-secondary">刷新 10 个订单</button>
          </div>
        </div>
      </div>
    </section>

    <section id="orders" class="list"></section>
    <div class="footer-actions">
      <button id="submitButtonBottom" class="button button-primary">提交</button>
      <button id="refreshButtonBottom" class="button button-secondary">刷新</button>
    </div>
  </div>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>
    const ordersEl = document.getElementById("orders");
    const statusEl = document.getElementById("status");
    const submitButtonBottom = document.getElementById("submitButtonBottom");
    const refreshButton = document.getElementById("refreshButton");
    const refreshButtonBottom = document.getElementById("refreshButtonBottom");
    const toastEl = document.getElementById("toast");
    let currentOrders = [];
    let toastTimer = null;

    function setStatus(text, isError = false) {
      statusEl.textContent = text;
      statusEl.style.color = isError ? "#b42318" : "#1f7a4f";
    }

    function showToast(text) {
      if (toastTimer) {
        window.clearTimeout(toastTimer);
      }
      toastEl.textContent = text;
      toastEl.classList.add("is-visible");
      toastTimer = window.setTimeout(() => {
        toastEl.classList.remove("is-visible");
      }, 2000);
    }

    function renderOrders(orders) {
      currentOrders = orders;
      ordersEl.innerHTML = orders.map((order, index) => {
        const rows = order.items.map(item => `
          <tr>
            <td>${item.name}</td>
            <td>${item.quantity}</td>
          </tr>
        `).join("");

        const options = order.options.map((value, optionIndex) => `
          <label class="option">
            <input type="radio" name="order-${index}" value="${value}">
            <span>
              <strong>${value}个</strong>
            </span>
          </label>
        `).join("");

        return `
          <article class="card">
            <table>
              <thead>
                <tr>
                  <th>商品名称</th>
                  <th>商品数量</th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
            <div class="options">${options}</div>
          </article>
        `;
      }).join("");
    }

    async function loadOrders() {
      setStatus("正在刷新订单...");
      ordersEl.innerHTML = "";
      const response = await fetch("/api/orders");
      const payload = await response.json();
      renderOrders(payload.orders);
      setStatus(`已随机展示 ${payload.orders.length} 个订单，请逐个选择。`);
    }

    function collectAnswers() {
      return currentOrders.map((order, index) => {
        const checked = document.querySelector(`input[name="order-${index}"]:checked`);
        if (!checked) {
          throw new Error("还有订单没有选择结果");
        }
        return {
          orderNo: order.orderNo,
          selectedCutlery: Number(checked.value),
          simulatedCutlery: order.simulatedCutlery,
          actualCutlery: order.actualCutlery,
          merchantCutlery: order.merchantCutlery,
          diff: order.diff
        };
      });
    }

    async function submitAnswers() {
      try {
        const answers = collectAnswers();
        setStatus("正在提交...");
        const response = await fetch("/api/submissions", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ answers })
        });
        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload.error || "提交失败");
        }
        setStatus(`提交成功，已保存 ${answers.length} 个订单的选择结果。`);
        showToast("提交成功，可以点击刷新继续参与");
      } catch (error) {
        setStatus(error.message, true);
        showToast(error.message);
      }
    }

    submitButtonBottom.addEventListener("click", submitAnswers);
    refreshButton.addEventListener("click", loadOrders);
    refreshButtonBottom.addEventListener("click", loadOrders);
    loadOrders().catch(error => setStatus(error.message, true));
  </script>
</body>
</html>
